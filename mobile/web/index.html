<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Астана ЖК — Подбор жилых комплексов</title>
    <meta name="description" content="Анализ и сравнение жилых комплексов в Астане. Инвестиции, семья, студенты." />
    <style>
      /* Reset RNW scroll lock */
      html {
        overflow: auto !important;
        height: auto !important;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: auto !important;
        height: auto !important;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background-color: #F8FAFB;
      }
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: visible !important;
        height: auto !important;
      }
      /* Override RNW inline overflow:hidden on nested wrappers */
      #root > div,
      #root > div > div,
      #root > div > div > div {
        overflow: visible !important;
        height: auto !important;
        min-height: auto !important;
      }
    </style>
  </head>
  <body>
    <noscript>Для работы приложения необходим JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
